<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/brands.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center mb-3">Travel Planner</h1>
    <p class="text-center text-muted mb-4">Find great places to visit on your next trip</p>
    
    <div class="row mb-4">
      <div class="col-md-6 offset-md-3">
        <div class="input-group mb-2">
          <input type="text" id="location-input" class="form-control" placeholder="Enter a location (e.g., New York, Paris)">
          <button class="btn btn-primary" id="search-button">Search</button>
        </div>
        <div class="text-center">
          <button id="use-location-button" class="btn btn-outline-success mt-2">
            <i class="fas fa-location-arrow"></i> Use My Location
          </button>
        </div>
      </div>
    </div>
    
    <div id="map-container">
      <div id="map"></div>
    </div>
    
    <div class="row mt-4">
      <div class="col-md-12 mb-3">
        <div class="category-select d-flex flex-wrap gap-2">
          <button class="btn btn-outline-primary category-btn active" data-type="restaurant">
            <i class="fas fa-utensils"></i> Restaurants
          </button>
          <button class="btn btn-outline-primary category-btn" data-type="cafe">
            <i class="fas fa-coffee"></i> Cafes
          </button>
          <button class="btn btn-outline-primary category-btn" data-type="bar">
            <i class="fas fa-glass-martini-alt"></i> Bars
          </button>
          <button class="btn btn-outline-info category-btn" data-type="restaurant" data-keyword="cheap">
            <i class="fas fa-dollar-sign"></i> Cheap Eats
          </button>
          <button class="btn btn-outline-danger category-btn" data-type="restaurant" data-keyword="asian">
            <i class="fas fa-utensils"></i> Asian
          </button>
          <button class="btn btn-outline-danger category-btn" data-type="restaurant" data-keyword="italian">
            <i class="fas fa-pizza-slice"></i> Italian
          </button>
          <button class="btn btn-outline-success category-btn" data-type="tourist_attraction">
            <i class="fas fa-landmark"></i> Attractions
          </button>
          <button class="btn btn-outline-warning category-btn" data-type="lodging">
            <i class="fas fa-bed"></i> Hotels
          </button>
        </div>
      </div>
    </div>
    
    <div class="row mb-2">
      <div class="col-12 text-end">
        <div class="sort-indicator">
          <small class="text-muted">
            <i class="fas fa-info-circle"></i> 
            Places are sorted by rating, prioritizing those with at least 20 reviews
          </small>
        </div>
      </div>
    </div>
    
    <div id="places-container" class="row mt-2">
      <!-- Places will be added here -->
      <div class="col-12 text-center py-5 text-muted">
        <p>Search for a location or use your current location to find places nearby</p>
      </div>
    </div>
  </div>
  
  <!-- Loading Indicator -->
  <div id="loading-indicator" class="d-none">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  
  <!-- Place Details Modal -->
  <div class="modal fade" id="place-modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Place Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="place-details">
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCcFIrPb2u_y-T_efsH-XaJyc_eQUsYMB8&libraries=places&callback=initMap" defer></script>
  <script src="app.js"></script>
</body>
</html>
