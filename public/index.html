<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #map {
      height: 500px;
      width: 100%;
      margin-top: 20px;
    }
    .search-container {
      margin: 20px 0;
    }
    .results-container {
      margin-top: 20px;
    }
    .place-card {
      margin-bottom: 15px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .place-card:hover {
      transform: translateY(-5px);
    }
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .error-message {
      display: none;
      color: #dc3545;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="py-3 mb-4 border-bottom">
      <h1 class="text-center">Travel Planner</h1>
    </header>

    <div class="search-container">
      <div class="input-group">
        <input type="text" id="searchInput" class="form-control" placeholder="Search for a location...">
        <button class="btn btn-primary" id="searchButton">Search</button>
      </div>
    </div>

    <div class="loading" id="loadingIndicator">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div id="map"></div>

    <div class="results-container row" id="placesResults"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    // Initialize variables
    let map;
    let markers = [];
    const API_BASE_URL = 'http://localhost:8000';
    
    // Helper to show loading indicator
    function showLoading() {
      document.getElementById('loadingIndicator').style.display = 'block';
    }
    
    // Helper to hide loading indicator
    function hideLoading() {
      document.getElementById('loadingIndicator').style.display = 'none';
    }
    
    // Helper to show error message
    function showError(message) {
      const errorElement = document.getElementById('errorMessage');
      errorElement.textContent = message;
      errorElement.style.display = 'block';
    }
    
    // Helper to hide error message
    function hideError() {
      document.getElementById('errorMessage').style.display = 'none';
    }
    
    // Initialize the Google Map
    function initMap() {
      // Default location (New York City)
      const defaultLocation = { lat: 40.7128, lng: -74.0060 };
      
      // Create the map
      map = new google.maps.Map(document.getElementById('map'), {
        center: defaultLocation,
        zoom: 12,
      });
      
      // Try to get user's current location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            
            // Center map on user location
            map.setCenter(userLocation);
            
            // Add marker for user location
            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: 'Your Location',
              icon: {
                url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'
              }
            });
          },
          () => {
            // Handle geolocation error silently, use default location
            console.log('Geolocation failed, using default location');
          }
        );
      }
      
      // Set up search functionality
      document.getElementById('searchButton').addEventListener('click', searchLocation);
      document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          searchLocation();
        }
      });
    }
    
    // Search for a location
    async function searchLocation() {
      const searchInput = document.getElementById('searchInput').value.trim();
      
      if (!searchInput) {
        showError('Please enter a location to search');
        return;
      }
      
      hideError();
      showLoading();
      clearMarkers();
      
      try {
        // Get location coordinates from search text
        const response = await axios.get(`${API_BASE_URL}/geocoding`, {
          params: { address: searchInput }
        });
        
        if (response.data && response.data.results && response.data.results.length > 0) {
          const location = response.data.results[0].geometry.location;
          
          // Center map on the searched location
          map.setCenter(location);
          map.setZoom(14);
          
          // Add marker for the searched location
          const marker = new google.maps.Marker({
            position: location,
            map: map,
            title: response.data.results[0].formatted_address
          });
          
          markers.push(marker);
          
          // Search for nearby places
          searchNearbyPlaces(location);
        } else {
          showError('Location not found. Please try a different search term.');
          hideLoading();
        }
      } catch (error) {
        console.error('Error searching location:', error);
        showError('Error searching location. Please try again later.');
        hideLoading();
      }
    }
    
    // Search for nearby places
    async function searchNearbyPlaces(location) {
      try {
        const response = await axios.get(`${API_BASE_URL}/places`, {
          params: {
            location: `${location.lat},${location.lng}`,
            radius: 1500,
            type: 'restaurant,lodging,tourist_attraction'
          }
        });
        
        if (response.data && response.data.results) {
          displayPlaces(response.data.results);
          addPlaceMarkers(response.data.results);
        } else {
          showError('No places found near this location.');
        }
      } catch (error) {
        console.error('Error searching nearby places:', error);
        showError('Error finding nearby places. Please try again later.');
      } finally {
        hideLoading();
      }
    }
    
    // Display places in the results container
    function displayPlaces(places) {
      const resultsContainer = document.getElementById('placesResults');
      resultsContainer.innerHTML = '';
      
      if (places.length === 0) {
        resultsContainer.innerHTML = '<div class="col-12"><p>No places found.</p></div>';
        return;
      }
      
      places.forEach(place => {
        const placeCard = document.createElement('div');
        placeCard.className = 'col-md-4 col-sm-6';
        
        const photoUrl = place.photos && place.photos.length > 0 
          ? `https://maps.googleapis.com/maps/api/place/photo?maxwidth=400&photoreference=${place.photos[0].photo_reference}&key=${googleMapsApiKey}`
          : 'https://via.placeholder.com/400x300?text=No+Image';
        
        placeCard.innerHTML = `
          <div class="card place-card" data-place-id="${place.place_id}">
            <img src="${photoUrl}" class="card-img-top" alt="${place.name}" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
            <div class="card-body">
              <h5 class="card-title">${place.name}</h5>
              <p class="card-text">
                ${place.vicinity || ''}
                ${place.rating ? `<br>Rating: ${place.rating}/5` : ''}
              </p>
              <button class="btn btn-sm btn-outline-primary view-details">View Details</button>
            </div>
          </div>
        `;
        
        resultsContainer.appendChild(placeCard);
        
        // Add event listener to view details button
        placeCard.querySelector('.view-details').addEventListener('click', () => {
          getPlaceDetails(place.place_id);
        });
      });
    }
    
    // Add markers for places on the map
    function addPlaceMarkers(places) {
      places.forEach(place => {
        if (place.geometry && place.geometry.location) {
          const marker = new google.maps.Marker({
            position: place.geometry.location,
            map: map,
            title: place.name,
            animation: google.maps.Animation.DROP
          });
          
          markers.push(marker);
          
          // Add click listener to marker
          marker.addListener('click', () => {
            getPlaceDetails(place.place_id);
          });
        }
      });
    }
    
    // Get details for a specific place
    async function getPlaceDetails(placeId) {
      showLoading();
      
      try {
        const response = await axios.get(`${API_BASE_URL}/places/details`, {
          params: {
            place_id: placeId,
            fields: 'name,rating,formatted_address,formatted_phone_number,website,opening_hours,reviews,photos'
          }
        });
        
        if (response.data && response.data.result) {
          displayPlaceDetails(response.data.result);
        } else {
          showError('Place details not found.');
        }
      } catch (error) {
        console.error('Error getting place details:', error);
        showError('Error getting place details. Please try again later.');
      } finally {
        hideLoading();
      }
    }
    
    // Display place details in a modal
    function displayPlaceDetails(place) {
      // Create modal if it doesn't exist
      let modal = document.getElementById('placeDetailsModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.className = 'modal fade';
        modal.id = 'placeDetailsModal';
        modal.setAttribute('tabindex', '-1');
        modal.setAttribute('aria-labelledby', 'placeDetailsModalLabel');
        modal.setAttribute('aria-hidden', 'true');
        
        modal.innerHTML = `
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="placeDetailsModalLabel"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body"></div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="addToItineraryBtn">Add to Itinerary</button>
              </div>
            </div>
          </div>
        `;
        
        document.body.appendChild(modal);
      }
      
      // Update modal content
      const modalTitle = document.getElementById('placeDetailsModalLabel');
      const modalBody = modal.querySelector('.modal-body');
      
      modalTitle.textContent = place.name;
      
      const photoUrl = place.photos && place.photos.length > 0 
        ? `https://maps.googleapis.com/maps/api/place/photo?maxwidth=800&photoreference=${place.photos[0].photo_reference}&key=${googleMapsApiKey}`
        : 'https://via.placeholder.com/800x400?text=No+Image';
      
      let reviewsHtml = '';
      if (place.reviews && place.reviews.length > 0) {
        reviewsHtml = '<h5 class="mt-4">Reviews</h5>';
        place.reviews.slice(0, 3).forEach(review => {
          reviewsHtml += `
            <div class="card mb-2">
              <div class="card-body">
                <h6>${review.author_name} - ${review.rating}/5</h6>
                <p>${review.text}</p>
              </div>
            </div>
          `;
        });
      }
      
      let hoursHtml = '';
      if (place.opening_hours && place.opening_hours.weekday_text) {
        hoursHtml = '<h5 class="mt-3">Opening Hours</h5><ul>';
        place.opening_hours.weekday_text.forEach(day => {
          hoursHtml += `<li>${day}</li>`;
        });
        hoursHtml += '</ul>';
      }
      
      modalBody.innerHTML = `
        <img src="${photoUrl}" class="img-fluid mb-3" alt="${place.name}" onerror="this.src='https://via.placeholder.com/800x400?text=No+Image'">
        <p><strong>Address:</strong> ${place.formatted_address || 'Not available'}</p>
        <p><strong>Rating:</strong> ${place.rating ? `${place.rating}/5` : 'Not rated'}</p>
        <p><strong>Phone:</strong> ${place.formatted_phone_number || 'Not available'}</p>
        <p>
          <strong>Website:</strong> 
          ${place.website ? `<a href="${place.website}" target="_blank">${place.website}</a>` : 'Not available'}
        </p>
        ${hoursHtml}
        ${reviewsHtml}
      `;
      
      // Show the modal
      const modalInstance = new bootstrap.Modal(modal);
      modalInstance.show();
      
      // Add event listener to "Add to Itinerary" button
      document.getElementById('addToItineraryBtn').addEventListener('click', () => {
        // To be implemented: Add selected place to a user's itinerary
        alert('This feature will be implemented in a future version.');
      });
    }
    
    // Clear all markers from the map
    function clearMarkers() {
      markers.forEach(marker => marker.setMap(null));
      markers = [];
    }
  </script>
  <script>
    // This placeholder will be replaced with the actual Google Maps API key in our workflow
    const googleMapsApiKey = '';
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=GOOGLE_MAPS_API_KEY_PLACEHOLDER&libraries=places&callback=initMap" async defer></script>
</body>
</html>
