<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crave - Discover Exceptional Dining</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Full-width Header -->
  <header class="crave-header text-center">
    <div class="content-container">
      <h1 class="brand-title">Crave</h1>
      <p class="brand-tagline">Discover exceptional experiences</p>
    </div>
  </header>
  
  <!-- Centered Content Container -->
  <div class="content-container">
    <!-- Unified Search Bar -->
    <div class="search-section mb-4">
      <div class="unified-search-bar">
        <div class="search-inputs">
          <div class="search-field location-field">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" id="location-input" placeholder="Location (e.g., Paris, Tokyo)">
          </div>
          <div class="search-divider"></div>
          <div class="search-field restaurant-field">
            <i class="fas fa-utensils"></i>
            <input type="text" id="restaurant-search-input" placeholder="Restaurant name (optional)">
          </div>
          <button class="search-btn" id="search-button">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>
      
      <!-- Action Buttons Row -->
      <div class="action-buttons-row">
        <button id="use-location-button" class="action-btn">
          <i class="fas fa-location-arrow"></i> Near Me
        </button>
        <button id="my-lists-button" class="action-btn">
          <i class="fas fa-bookmark"></i> Saved
          <span id="lists-count" class="count-badge" style="display: none;">0</span>
        </button>
        <button id="filters-toggle" class="action-btn">
          <i class="fas fa-sliders-h"></i> Filters
        </button>
        <div class="dark-mode-toggle">
          <input type="checkbox" id="dark-mode-toggle">
          <label for="dark-mode-toggle"><i class="fas fa-moon"></i></label>
        </div>
      </div>
    </div>
    
    <!-- Collapsible Filters Panel -->
    <div class="filters-section mb-4" id="filters-panel" style="display: none;">
      <div class="filters-card">
        <div class="filter-group">
          <label class="filter-label">Search Radius: <span id="radius-value">1.5</span> km</label>
          <input type="range" class="premium-slider" id="radius-slider" min="500" max="5000" step="100" value="1500">
          <div class="slider-labels">
            <span>500m</span>
            <span>2.5km</span>
            <span>5km</span>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-checkbox">
            <input type="checkbox" id="open-now-checkbox">
            <span class="checkmark"></span>
            Open now only
          </label>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Full-width Map -->
  <div class="map-section">
    <div id="map-container">
      <div id="map" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;"></div>
      
      <!-- Weather Pill (Glassmorphism) -->
      <div id="weather-pill" class="weather-pill" style="display: none;">
        <div id="weather-icon-mini"></div>
        <span id="weather-temp-mini">--°</span>
        <span id="weather-desc-mini">--</span>
      </div>
      
      <!-- Share Button -->
      <button id="share-btn" class="map-float-btn" style="top: 60px; left: 16px;">
        <i class="fas fa-share-alt"></i>
      </button>
      <!-- Search This Area Button -->
      <button id="search-this-area-btn" class="search-area-btn" style="display: none;">
        <i class="fas fa-redo-alt"></i> Search This Area
      </button>
      <!-- Transit Layer Toggle -->
      <button id="transit-layer-btn" class="map-float-btn" style="bottom: 16px; left: 16px;" title="Transit">
        <i class="fas fa-subway"></i>
      </button>
    </div>
  </div>
  
  <!-- Hidden Weather Container for data fetching -->
  <div id="weather-container" style="display: none;">
    <span id="weather-location"></span>
    <span id="weather-description"></span>
    <span id="weather-feels-like"></span>
    <span id="weather-wind"></span>
    <span id="weather-humidity"></span>
    <span id="weather-sun-times"></span>
    <div id="weather-details"></div>
    <div id="weather-forecast"></div>
  </div>
  
  <!-- Centered Content for Categories and Cards -->
  <div class="content-container results-section">
    <div class="categories-section mt-4 mb-3">
      <!-- Hidden select for type compatibility with JavaScript -->
      <select id="place-type-select" class="form-select mb-3">
        <option value="restaurant" selected>Restaurants</option>
        <option value="cafe">Cafes</option>
        <option value="bar">Bars</option>
        <option value="tourist_attraction">Attractions</option>
        <option value="lodging">Hotels</option>
        <option value="night_club">Nightclubs</option>
        <option value="supermarket">Supermarkets</option>
      </select>
      
      <div class="category-select">
        <button id="restaurants-button" class="category-btn active" data-type="restaurant">
          Restaurants
        </button>
        <button id="coffee-button" class="category-btn" data-type="cafe">
          Cafes
        </button>
        <button class="category-btn" data-type="bar">
          Bars
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="cheap">
          Cheap Eats
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="asian">
          Asian
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="italian">
          Italian
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="french">
          French
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="thai">
          Thai
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="chinese">
          Chinese
        </button>
        <button class="category-btn" data-type="restaurant" data-keyword="fine dining">
          Fine Dining
        </button>
        <button id="attractions-button" class="category-btn" data-type="tourist_attraction">
          Attractions
        </button>
        <button id="hotels-button" class="category-btn" data-type="lodging">
          Hotels
        </button>
        <button id="dessert-button" class="category-btn" data-type="restaurant" data-keyword="dessert">
          Desserts
        </button>
        <button id="nightlife-button" class="category-btn" data-type="night_club">
          Nightclubs
        </button>
        <button class="category-btn" data-type="supermarket">
          Groceries
        </button>
        <button id="favorites-button" class="category-btn favorites-btn">
          <i class="fas fa-heart"></i> Favorites
          <span id="favorites-count" class="badge bg-danger" style="display: none;">0</span>
        </button>
      </div>
    </div>
    
    <div class="results-header mb-3 d-flex justify-content-between align-items-center">
      <div id="results-count" class="results-count" style="display: none;">
        <span class="fw-semibold" id="count-number">0</span> places found
      </div>
      <div class="sort-controls d-inline-flex align-items-center gap-2">
        <label for="sort-select" class="text-muted small mb-0">Sort by:</label>
        <select id="sort-select" class="form-select form-select-sm" style="width: auto;">
          <option value="rating" selected>Rating (highest)</option>
          <option value="reviews">Most Reviews</option>
          <option value="distance">Distance</option>
          <option value="name">Name (A-Z)</option>
        </select>
      </div>
    </div>
    
    <div id="places-container" class="row mt-2">
      <!-- Places will be added here -->
      <div class="col-12 text-center py-5 text-muted">
        <p>Search for a location or use your current location to find places nearby</p>
      </div>
    </div>
  </div>
  
  <!-- Loading Indicator -->
  <div id="loading-indicator" style="display: none;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  
  <!-- Place Details Modal -->
  <div class="modal fade" id="place-modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Place Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="place-details">
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- My Lists Modal -->
  <div class="modal fade" id="lists-modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-list me-2"></i>My Restaurant Lists</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="lists-modal-body">
          <div class="mb-3">
            <div class="input-group">
              <input type="text" id="new-list-name" class="form-control" placeholder="New list name (e.g., 'Date Night Spots')">
              <button class="btn btn-primary" id="create-list-btn">
                <i class="fas fa-plus"></i> Create List
              </button>
            </div>
          </div>
          <hr>
          <div id="lists-container">
            <p class="text-muted text-center">No lists yet. Create one above!</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Add to List Modal -->
  <div class="modal fade" id="add-to-list-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>Add to List</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="add-to-list-body">
          <p class="mb-3">Select a list for <strong id="add-to-list-place-name"></strong>:</p>
          <div id="add-to-list-options">
            <!-- List options will be populated here -->
          </div>
          <hr>
          <div class="input-group">
            <input type="text" id="quick-create-list-name" class="form-control" placeholder="Or create a new list...">
            <button class="btn btn-outline-primary" id="quick-create-list-btn">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <!-- Load app.js first so initMap is defined before the Maps API loads -->
  <script src="app.js"></script>
  <!-- Use a server-side script to inject the API key from environment variables -->
  <script src="/api/maps-loader"></script>
</body>
</html>
