<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    #map {
      height: 500px;
      width: 100%;
      margin-top: 20px;
      border-radius: 8px;
      overflow: hidden;
    }
    .search-container {
      margin: 20px 0;
    }
    .results-container {
      margin-top: 20px;
    }
    .place-card {
      margin-bottom: 15px;
      cursor: pointer;
      transition: transform 0.2s;
      height: 100%;
    }
    .place-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .error-message {
      display: none;
      color: #dc3545;
      margin: 20px 0;
      padding: 10px;
      border-radius: 4px;
      background-color: #f8d7da;
    }
    .card-img-top {
      height: 180px;
      object-fit: cover;
    }
    .header-logo {
      font-size: 2.5rem;
      margin-right: 10px;
      color: #0d6efd;
    }
    .itinerary-section {
      margin-top: 30px;
      padding: 20px;
      background-color: #f8f9fa;
      border-radius: 8px;
    }
    .itinerary-item {
      padding: 10px;
      margin-bottom: 10px;
      background-color: white;
      border-radius: 4px;
      border-left: 4px solid #0d6efd;
    }
    .badge {
      margin-right: 5px;
    }
    .itinerary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .btn-icon {
      display: inline-flex;
      align-items: center;
    }
    .btn-icon i {
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="py-3 mb-4 border-bottom">
      <div class="d-flex align-items-center justify-content-center">
        <i class="fas fa-map-marked-alt header-logo"></i>
        <h1>Travel Planner</h1>
      </div>
    </header>

    <div class="search-container">
      <div class="input-group">
        <input type="text" id="searchInput" class="form-control" placeholder="Search for a location (e.g., New York, Paris, Tokyo)...">
        <button class="btn btn-primary" id="searchButton">
          <i class="fas fa-search"></i> Search
        </button>
      </div>
    </div>

    <div class="loading" id="loadingIndicator">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2">Searching for places...</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div id="map"></div>

    <div class="results-container">
      <h3 class="mb-3 mt-4" id="resultsTitle">Places of Interest</h3>
      <div class="row" id="placesResults"></div>
    </div>

    <div class="itinerary-section" id="itinerarySection" style="display: none;">
      <div class="itinerary-header">
        <h3>My Itinerary</h3>
        <button class="btn btn-outline-primary btn-sm btn-icon" id="saveItineraryBtn">
          <i class="fas fa-save"></i> Save Itinerary
        </button>
      </div>
      <div id="itineraryItems">
        <!-- Itinerary items will be added here dynamically -->
      </div>
      
      <!-- Save Itinerary Modal -->
      <div class="modal fade" id="saveItineraryModal" tabindex="-1" aria-labelledby="saveItineraryModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="saveItineraryModalLabel">Save Your Itinerary</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="saveItineraryForm">
                <div class="mb-3">
                  <label for="itineraryName" class="form-label">Name your itinerary</label>
                  <input type="text" class="form-control" id="itineraryName" required 
                    placeholder="e.g., Weekend in Paris, NYC Food Tour">
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="button" class="btn btn-primary" id="confirmSaveItinerary">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Place Details Modal -->
  <div class="modal fade" id="placeDetailsModal" tabindex="-1" aria-labelledby="placeDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="placeDetailsModalLabel">Place Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="placeDetailsBody">
          <!-- Place details will be loaded here -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="addToItineraryBtn">
            <i class="fas fa-plus"></i> Add to Itinerary
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    // Global variables
    let map;
    let markers = [];
    let infoWindow;
    let placesService;
    let geocoder;
    let itineraryItems = [];
    let currentPlaceId = null;
    
    // Helper functions for UI
    function showLoading() {
      document.getElementById('loadingIndicator').style.display = 'block';
    }
    
    function hideLoading() {
      document.getElementById('loadingIndicator').style.display = 'none';
    }
    
    function showError(message) {
      const errorElement = document.getElementById('errorMessage');
      errorElement.textContent = message;
      errorElement.style.display = 'block';
      setTimeout(() => {
        errorElement.style.display = 'none';
      }, 5000);
    }
    
    function hideError() {
      document.getElementById('errorMessage').style.display = 'none';
    }
    
    // Initialize Google Maps
    function initMap() {
      // Default location (New York City)
      const defaultLocation = { lat: 40.7128, lng: -74.0060 };
      
      // Create the map
      map = new google.maps.Map(document.getElementById('map'), {
        center: defaultLocation,
        zoom: 12,
        mapTypeControl: true,
        streetViewControl: true,
        fullscreenControl: true,
        zoomControl: true,
        mapTypeId: google.maps.MapTypeId.ROADMAP
      });
      
      // Create geocoder and places service
      geocoder = new google.maps.Geocoder();
      placesService = new google.maps.places.PlacesService(map);
      infoWindow = new google.maps.InfoWindow();
      
      // Try to get user's current location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            
            // Center map on user location
            map.setCenter(userLocation);
            
            // Add marker for user location
            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: 'Your Location',
              icon: {
                url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'
              }
            });
            
            // Search for places near the user's location
            searchNearbyPlaces(userLocation);
          },
          () => {
            // Handle geolocation error silently, use default location
            console.log('Geolocation failed, using default location');
            searchNearbyPlaces(defaultLocation);
          }
        );
      } else {
        // Browser doesn't support geolocation, use default location
        searchNearbyPlaces(defaultLocation);
      }
      
      // Set up search functionality
      document.getElementById('searchButton').addEventListener('click', searchLocation);
      document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          searchLocation();
        }
      });
    }
    
    // Search for a location
    function searchLocation() {
      const searchInput = document.getElementById('searchInput').value.trim();
      
      if (!searchInput) {
        showError('Please enter a location to search');
        return;
      }
      
      hideError();
      showLoading();
      clearMarkers();
      
      geocoder.geocode({ address: searchInput }, (results, status) => {
        if (status === google.maps.GeocoderStatus.OK && results.length > 0) {
          const location = results[0].geometry.location;
          
          // Center map on the searched location
          map.setCenter(location);
          map.setZoom(14);
          
          // Add marker for the searched location
          const marker = new google.maps.Marker({
            position: location,
            map: map,
            title: results[0].formatted_address
          });
          
          markers.push(marker);
          
          // Open info window with location name
          infoWindow.setContent(`<div><strong>${results[0].formatted_address}</strong></div>`);
          infoWindow.open(map, marker);
          
          // Search for nearby places
          searchNearbyPlaces(location);
        } else {
          showError('Location not found. Please try a different search term.');
          hideLoading();
        }
      });
    }
    
    // Search for nearby places
    function searchNearbyPlaces(location) {
      const request = {
        location: location,
        radius: 1500,
        type: ['tourist_attraction', 'lodging', 'restaurant']
      };
      
      placesService.nearbySearch(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
          displayPlaces(results);
          addPlaceMarkers(results);
        } else {
          showError('No places found near this location.');
        }
        hideLoading();
      });
    }
    
    // Display places in the results container
    function displayPlaces(places) {
      const resultsContainer = document.getElementById('placesResults');
      resultsContainer.innerHTML = '';
      
      if (places.length === 0) {
        resultsContainer.innerHTML = '<div class="col-12"><p>No places found.</p></div>';
        return;
      }
      
      places.forEach(place => {
        const placeCard = document.createElement('div');
        placeCard.className = 'col-md-4 col-sm-6 mb-4';
        
        const photoUrl = place.photos && place.photos.length > 0 
          ? place.photos[0].getUrl({ maxWidth: 300, maxHeight: 200 })
          : 'https://via.placeholder.com/300x200?text=No+Image';
        
        let placeType = 'point_of_interest';
        let typeIcon = 'fas fa-map-marker-alt';
        let typeBadge = 'secondary';
        
        if (place.types) {
          // Determine primary type and icon
          if (place.types.includes('restaurant') || place.types.includes('food')) {
            placeType = 'restaurant';
            typeIcon = 'fas fa-utensils';
            typeBadge = 'danger';
          } else if (place.types.includes('lodging') || place.types.includes('hotel')) {
            placeType = 'hotel';
            typeIcon = 'fas fa-bed';
            typeBadge = 'info';
          } else if (place.types.includes('tourist_attraction') || place.types.includes('museum')) {
            placeType = 'attraction';
            typeIcon = 'fas fa-landmark';
            typeBadge = 'warning';
          } else if (place.types.includes('park') || place.types.includes('natural_feature')) {
            placeType = 'nature';
            typeIcon = 'fas fa-tree';
            typeBadge = 'success';
          }
        }
        
        placeCard.innerHTML = `
          <div class="card place-card shadow-sm h-100" data-place-id="${place.place_id}">
            <img src="${photoUrl}" class="card-img-top" alt="${place.name}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${place.name}</h5>
              <div class="mb-2">
                <span class="badge bg-${typeBadge}"><i class="${typeIcon}"></i> ${placeType.replace('_', ' ')}</span>
                ${place.rating ? `<span class="badge bg-primary"><i class="fas fa-star"></i> ${place.rating}/5</span>` : ''}
              </div>
              <p class="card-text text-muted">${place.vicinity || ''}</p>
              <div class="mt-auto">
                <button class="btn btn-sm btn-outline-primary view-details">
                  <i class="fas fa-info-circle"></i> View Details
                </button>
              </div>
            </div>
          </div>
        `;
        
        resultsContainer.appendChild(placeCard);
        
        // Add event listener to view details button
        placeCard.querySelector('.view-details').addEventListener('click', () => {
          getPlaceDetails(place.place_id);
        });
      });
    }
    
    // Add markers for places on the map
    function addPlaceMarkers(places) {
      places.forEach(place => {
        if (place.geometry && place.geometry.location) {
          const marker = new google.maps.Marker({
            position: place.geometry.location,
            map: map,
            title: place.name,
            animation: google.maps.Animation.DROP
          });
          
          markers.push(marker);
          
          // Add click listener to marker
          marker.addListener('click', () => {
            infoWindow.setContent(`
              <div>
                <strong>${place.name}</strong>
                <p>${place.vicinity || ''}</p>
                <button onclick="getPlaceDetails('${place.place_id}')">View Details</button>
              </div>
            `);
            infoWindow.open(map, marker);
          });
        }
      });
    }
    
    // Get details for a specific place
    function getPlaceDetails(placeId) {
      showLoading();
      currentPlaceId = placeId;
      
      const request = {
        placeId: placeId,
        fields: ['name', 'rating', 'formatted_address', 'formatted_phone_number', 'website', 'opening_hours', 'review', 'photo', 'type']
      };
      
      placesService.getDetails(request, (place, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
          displayPlaceDetails(place);
        } else {
          showError('Place details not found.');
        }
        hideLoading();
      });
    }
    
    // Display place details in a modal
    function displayPlaceDetails(place) {
      if (!place) {
        showError('Place details not available');
        return;
      }
      
      const modalTitle = document.getElementById('placeDetailsModalLabel');
      const modalBody = document.getElementById('placeDetailsBody');
      
      modalTitle.textContent = place.name;
      
      const photoUrl = place.photos && place.photos.length > 0 
        ? place.photos[0].getUrl({ maxWidth: 800, maxHeight: 400 })
        : 'https://via.placeholder.com/800x400?text=No+Image';
      
      let reviewsHtml = '';
      if (place.reviews && place.reviews.length > 0) {
        reviewsHtml = '<h5 class="mt-4">Reviews</h5>';
        place.reviews.slice(0, 3).forEach(review => {
          reviewsHtml += `
            <div class="card mb-2">
              <div class="card-body">
                <div class="d-flex justify-content-between">
                  <h6>${review.author_name}</h6>
                  <div>
                    ${Array(Math.floor(review.rating)).fill(`<i class="fas fa-star text-warning"></i>`).join('')}
                    ${review.rating % 1 !== 0 ? `<i class="fas fa-star-half-alt text-warning"></i>` : ''}
                  </div>
                </div>
                <p class="mb-0">${review.text}</p>
              </div>
            </div>
          `;
        });
      }
      
      let hoursHtml = '';
      if (place.opening_hours && place.opening_hours.weekday_text) {
        hoursHtml = '<h5 class="mt-3">Opening Hours</h5><ul class="list-group mb-3">';
        place.opening_hours.weekday_text.forEach(day => {
          hoursHtml += `<li class="list-group-item">${day}</li>`;
        });
        hoursHtml += '</ul>';
      }
      
      modalBody.innerHTML = `
        <img src="${photoUrl}" class="img-fluid mb-3 rounded" alt="${place.name}" onerror="this.src='https://via.placeholder.com/800x400?text=No+Image'">
        
        <div class="row mb-3">
          <div class="col-md-6">
            <p><i class="fas fa-map-marker-alt text-danger me-2"></i><strong>Address:</strong> ${place.formatted_address || 'Not available'}</p>
            <p><i class="fas fa-phone text-success me-2"></i><strong>Phone:</strong> ${place.formatted_phone_number || 'Not available'}</p>
          </div>
          <div class="col-md-6">
            <p>
              <i class="fas fa-star text-warning me-2"></i><strong>Rating:</strong> 
              ${place.rating ? `${place.rating}/5` : 'Not rated'}
            </p>
            <p>
              <i class="fas fa-globe text-primary me-2"></i><strong>Website:</strong> 
              ${place.website ? `<a href="${place.website}" target="_blank">${place.website}</a>` : 'Not available'}
            </p>
          </div>
        </div>
        
        ${hoursHtml}
        ${reviewsHtml}
      `;
      
      // Show the modal
      const modal = new bootstrap.Modal(document.getElementById('placeDetailsModal'));
      modal.show();
    }
    
    // Clear all markers from the map
    function clearMarkers() {
      markers.forEach(marker => marker.setMap(null));
      markers = [];
    }
    
    // Add place to itinerary
    document.getElementById('addToItineraryBtn').addEventListener('click', () => {
      if (!currentPlaceId) return;
      
      const request = {
        placeId: currentPlaceId,
        fields: ['name', 'vicinity', 'rating', 'types', 'photos']
      };
      
      placesService.getDetails(request, (place, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
          // Check if place is already in itinerary
          if (itineraryItems.some(item => item.place_id === currentPlaceId)) {
            showError('This place is already in your itinerary.');
            return;
          }
          
          // Add to itinerary
          itineraryItems.push({
            place_id: currentPlaceId,
            name: place.name,
            vicinity: place.vicinity,
            types: place.types,
            rating: place.rating,
            photo: place.photos && place.photos.length > 0 ? place.photos[0].getUrl({ maxWidth: 100, maxHeight: 100 }) : null
          });
          
          updateItinerary();
          
          // Show itinerary section if it's hidden
          document.getElementById('itinerarySection').style.display = 'block';
          
          // Close the modal
          const modal = bootstrap.Modal.getInstance(document.getElementById('placeDetailsModal'));
          modal.hide();
        } else {
          showError('Could not add place to itinerary.');
        }
      });
    });
    
    // Update itinerary display
    function updateItinerary() {
      const container = document.getElementById('itineraryItems');
      container.innerHTML = '';
      
      if (itineraryItems.length === 0) {
        container.innerHTML = '<p>Your itinerary is empty. Add places by clicking "Add to Itinerary" when viewing place details.</p>';
        return;
      }
      
      itineraryItems.forEach((item, index) => {
        const itemElement = document.createElement('div');
        itemElement.className = 'itinerary-item d-flex justify-content-between align-items-center';
        
        const placeType = item.types && item.types.length > 0 ? item.types[0] : 'place';
        let typeIcon = 'fas fa-map-marker-alt';
        
        if (placeType.includes('restaurant') || placeType.includes('food')) {
          typeIcon = 'fas fa-utensils';
        } else if (placeType.includes('lodging') || placeType.includes('hotel')) {
          typeIcon = 'fas fa-bed';
        } else if (placeType.includes('tourist_attraction') || placeType.includes('museum')) {
          typeIcon = 'fas fa-landmark';
        } else if (placeType.includes('park') || placeType.includes('natural_feature')) {
          typeIcon = 'fas fa-tree';
        }
        
        itemElement.innerHTML = `
          <div>
            <h5><i class="${typeIcon} me-2"></i> ${item.name}</h5>
            <p class="text-muted mb-0">${item.vicinity || ''}</p>
          </div>
          <button class="btn btn-sm btn-outline-danger remove-item" data-index="${index}">
            <i class="fas fa-times"></i>
          </button>
        `;
        
        container.appendChild(itemElement);
        
        // Add event listener to remove button
        itemElement.querySelector('.remove-item').addEventListener('click', (e) => {
          const idx = parseInt(e.currentTarget.getAttribute('data-index'));
          itineraryItems.splice(idx, 1);
          updateItinerary();
          
          // Hide itinerary section if empty
          if (itineraryItems.length === 0) {
            document.getElementById('itinerarySection').style.display = 'none';
          }
        });
      });
    }
    
    // Save itinerary to the database
    function saveItineraryToDatabase(name) {
      if (itineraryItems.length === 0) {
        showError('Cannot save an empty itinerary. Add some places first.');
        return;
      }
      
      showLoading();
      
      // Create the data object to send to the server
      const itineraryData = {
        name: name,
        places: itineraryItems
      };
      
      // Make the API request
      axios.post('/itineraries', itineraryData)
        .then(response => {
          hideLoading();
          const modal = bootstrap.Modal.getInstance(document.getElementById('saveItineraryModal'));
          modal.hide();
          
          // Show success message
          showError(`Itinerary "${name}" saved successfully!`);
          document.getElementById('itineraryName').value = '';
        })
        .catch(error => {
          hideLoading();
          console.error('Error saving itinerary:', error);
          showError('Failed to save itinerary. Please try again.');
        });
    }
    
    // Set up save itinerary button click handler
    document.getElementById('saveItineraryBtn').addEventListener('click', () => {
      // Show the save itinerary modal
      const saveModal = new bootstrap.Modal(document.getElementById('saveItineraryModal'));
      saveModal.show();
    });
    
    // Set up confirm save button click handler
    document.getElementById('confirmSaveItinerary').addEventListener('click', () => {
      const itineraryName = document.getElementById('itineraryName').value.trim();
      
      if (!itineraryName) {
        document.getElementById('itineraryName').focus();
        return;
      }
      
      saveItineraryToDatabase(itineraryName);
    });
    
    // Make getPlaceDetails globally accessible for map popup buttons
    window.getPlaceDetails = getPlaceDetails;
  </script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCcFIrPb2u_y-T_efsH-XaJyc_eQUsYMB8&libraries=places&callback=initMap">
  </script>
</body>
</html>
