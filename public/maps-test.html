<!DOCTYPE html>
<html>
<head>
  <title>Simple Google Maps Example</title>
  <style>
    #map {
      height: 500px;
      width: 100%;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h1>Google Maps Test</h1>
  <div id="map"></div>

  <script>
    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 52.3676, lng: 4.9041 },
        zoom: 12,
      });
      
      // Add a marker
      new google.maps.Marker({
        position: { lat: 52.3676, lng: 4.9041 },
        map: map,
        title: "Amsterdam"
      });
      
      console.log("Map initialized!");
    }
  </script>
  <script src="/api/maps-loader"></script>
</body>
</html>
