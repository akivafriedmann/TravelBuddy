<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner Map</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #map {
      height: 600px;
      width: 100%;
    }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center mb-4">Travel Planner</h1>
    
    <div class="row mb-4">
      <div class="col-md-6 offset-md-3">
        <div class="input-group">
          <input type="text" id="location-input" class="form-control" placeholder="Enter a location (e.g., New York, Paris)">
          <button class="btn btn-primary" id="search-button">Search</button>
        </div>
        <div class="d-flex justify-content-center mt-2">
          <button id="use-location-button" class="btn btn-outline-success btn-sm">
            <i class="fa fa-location-arrow"></i> Use My Location
          </button>
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col-12">
        <div id="map"></div>
      </div>
    </div>
    
    <div class="row mt-4">
      <div class="col-12">
        <div id="places-list" class="row"></div>
      </div>
    </div>
  </div>
  
  <div id="loading" class="loading" style="display: none;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  
  <script>
    // Global variables
    let map;
    let markers = [];
    
    // Initialize map
    function initMap() {
      console.log('Map initialization starting...');
      
      // Default center (Amsterdam)
      const defaultCenter = { lat: 52.3676, lng: 4.9041 };
      
      // Create map
      map = new google.maps.Map(document.getElementById('map'), {
        center: defaultCenter,
        zoom: 14,
        mapTypeControl: true,
        fullscreenControl: true
      });
      
      // Add a default marker
      addMarker(defaultCenter, 'Amsterdam');
      
      // Add event listeners
      document.getElementById('search-button').addEventListener('click', searchLocation);
      document.getElementById('use-location-button').addEventListener('click', useMyLocation);
      document.getElementById('location-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          searchLocation();
        }
      });
      
      console.log('Map initialized successfully!');
    }
    
    // Add a marker to the map
    function addMarker(position, title) {
      const marker = new google.maps.Marker({
        position: position,
        map: map,
        title: title || 'Location'
      });
      
      markers.push(marker);
      return marker;
    }
    
    // Clear all markers
    function clearMarkers() {
      markers.forEach(marker => marker.setMap(null));
      markers = [];
    }
    
    // Search for a location
    async function searchLocation() {
      const input = document.getElementById('location-input').value.trim();
      
      if (!input) {
        alert('Please enter a location name');
        return;
      }
      
      showLoading();
      
      try {
        const response = await fetch(`/api/geocode?address=${encodeURIComponent(input)}`);
        const data = await response.json();
        
        if (data.status === 'OK' && data.results && data.results.length > 0) {
          const location = data.results[0].geometry.location;
          
          // Center map on the location
          map.setCenter(location);
          
          // Clear existing markers
          clearMarkers();
          
          // Add a marker for the found location
          addMarker(location, input);
          
          // Find nearby places
          fetchNearbyPlaces(location);
        } else {
          alert('Location not found. Please try a different search term.');
        }
      } catch (error) {
        console.error('Error searching location:', error);
        alert('Error searching for location. Please try again.');
      } finally {
        hideLoading();
      }
    }
    
    // Use user's current location
    function useMyLocation() {
      if (navigator.geolocation) {
        showLoading();
        
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            
            // Center map on user location
            map.setCenter(userLocation);
            
            // Clear existing markers
            clearMarkers();
            
            // Add a marker for user location
            addMarker(userLocation, 'Your Location');
            
            // Find nearby places
            fetchNearbyPlaces(userLocation);
            
            hideLoading();
          },
          (error) => {
            console.error('Geolocation error:', error);
            alert('Unable to get your location. ' + error.message);
            hideLoading();
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 60000
          }
        );
      } else {
        alert('Geolocation is not supported by your browser');
      }
    }
    
    // Fetch nearby places
    async function fetchNearbyPlaces(location) {
      try {
        showLoading();
        
        const response = await fetch(`/api/nearby?lat=${location.lat}&lng=${location.lng}&type=restaurant&radius=1500`);
        const data = await response.json();
        
        if (data.status === 'OK' && data.results && data.results.length > 0) {
          // Display places
          displayPlaces(data.results, location);
        } else {
          document.getElementById('places-list').innerHTML = `
            <div class="col-12">
              <div class="alert alert-info">No places found nearby. Try another location.</div>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error fetching nearby places:', error);
        document.getElementById('places-list').innerHTML = `
          <div class="col-12">
            <div class="alert alert-danger">Error loading places. Please try again later.</div>
          </div>
        `;
      } finally {
        hideLoading();
      }
    }
    
    // Display places on the map and in the list
    function displayPlaces(places, origin) {
      // Clear existing markers
      clearMarkers();
      
      // Add a marker for each place
      places.forEach((place, index) => {
        if (place.geometry && place.geometry.location) {
          const position = {
            lat: place.geometry.location.lat,
            lng: place.geometry.location.lng
          };
          
          // Add marker with label
          const marker = new google.maps.Marker({
            position: position,
            map: map,
            title: place.name,
            label: {
              text: (index + 1).toString(),
              color: 'white'
            }
          });
          
          markers.push(marker);
          
          // Add click event to marker
          marker.addListener('click', () => {
            showPlaceDetails(place);
          });
        }
      });
      
      // Display places in the list
      const placesList = document.getElementById('places-list');
      placesList.innerHTML = '';
      
      places.forEach((place, index) => {
        const placeCard = document.createElement('div');
        placeCard.className = 'col-md-4 mb-3';
        
        // Format rating stars
        let ratingStars = '';
        if (place.rating) {
          const fullStars = Math.floor(place.rating);
          for (let i = 0; i < fullStars; i++) {
            ratingStars += '★';
          }
          if (place.rating % 1 >= 0.5) {
            ratingStars += '½';
          }
          const emptyStars = 5 - Math.ceil(place.rating);
          for (let i = 0; i < emptyStars; i++) {
            ratingStars += '☆';
          }
        }
        
        placeCard.innerHTML = `
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">${index + 1}. ${place.name}</h5>
              <p class="card-text small text-muted">${place.vicinity || ''}</p>
              <div class="d-flex justify-content-between mb-2">
                <div>
                  ${place.rating ? `
                    <span class="text-warning">${ratingStars}</span>
                    <span class="ms-1">${place.rating}</span>
                    <small class="text-muted">(${place.user_ratings_total || 0})</small>
                  ` : ''}
                </div>
                <div>
                  ${place.price_level ? '$'.repeat(place.price_level) : ''}
                </div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="showPlaceDetails(${JSON.stringify(place).replace(/"/g, '&quot;')})">View Details</button>
            </div>
          </div>
        `;
        
        placesList.appendChild(placeCard);
      });
    }
    
    // Show place details (placeholder, you can expand this)
    function showPlaceDetails(place) {
      alert(`Selected: ${place.name}\nRating: ${place.rating || 'N/A'}\nAddress: ${place.vicinity || 'N/A'}`);
      
      // Center the map on this place
      if (place.geometry && place.geometry.location) {
        map.setCenter({
          lat: place.geometry.location.lat,
          lng: place.geometry.location.lng
        });
        map.setZoom(16);
      }
    }
    
    // Show loading indicator
    function showLoading() {
      document.getElementById('loading').style.display = 'flex';
    }
    
    // Hide loading indicator
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
  </script>
  
  <!-- Load Maps API with server-side key -->
  <script src="/api/maps-loader"></script>
</body>
</html>
